<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Цветные квадраты</title>
    <style>
        /* Простые стили */
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            transition: background-color 0.3s;
        }

        /* Контейнер с квадратами */
        .container {
            display: flex;
            gap: 20px;
            padding: 20px;
        }

        /* Квадраты */
        .square {
            width: 150px;
            height: 150px;
            cursor: pointer;
            border: 2px solid #333;
        }

        /* Цвета квадратов */
        .red { background-color: red; }
        .green { background-color: green; }
        .blue { background-color: blue; }
    </style>
</head>
<body>

<div class="container">
    <div class="square red"></div>
    <div class="square green"></div>
    <div class="square blue"></div>
</div>

<script>
    // Находим все квадраты
    const squares = document.querySelectorAll('.square');
    
    // Для каждого квадрата добавляем обработчик клика
    squares.forEach(square => {
        square.addEventListener('click', function() {
            // Берём цвет квадрата и меняем фон страницы
            const color = window.getComputedStyle(square).backgroundColor;
            document.body.style.backgroundColor = color;
        });
    });
</script>

</body>
</html>
